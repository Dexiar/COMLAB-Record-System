
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Computer Lab Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="login-container">
        <h1>Student Time in</h1>

        <form action="">

            <div class="input-group">
                <label for="">Student ID: </label>
                <input type="text" placeholder="Enter Student ID" required>
            </div>

            <div class="input-group">
                <label for="">Full Name: </label>
                <input type="text" placeholder="Enter Full Name" required>
            </div>

            <div class="input-group">
                <label for="">Grade & Section: </label>
                <input type="text" placeholder="e.g. Grade 11- Aristotle" required>
            </div>

            <div class="input-group">
                <label for="">Computer Name</label>
                <select name="" id="" required>
                    <option value="">Computer1</option>
                    <option value="">Computer2</option>
                    <option value="">Computer3</option>
                    <option value="">Computer4</option>
                    <option value="">Computer5</option>
                    <option value="">Computer6</option>
                    <option value="">Computer7</option>
                    <option value="">Computer8</option>
                    <option value="">Computer10</option>
                    <option value="">Computer11</option>
                    <option value="">Computer12</option>
                    <option value="">Computer13</option>
                    <option value="">Computer14</option>
                    <option value="">Computer15</option>
                    <option value="">Computer16</option>
                    <option value="">Computer17</option>
                    <option value="">Computer18</option>
                    <option value="">Computer19</option>
                    <option value="">Computer20</option>
                    <option value="">Computer21</option>
                    <option value="">Computer22</option>
                    <option value="">Computer23</option>
                    <option value="">Computer24</option>
                    <option value="">Computer25</option>
                    <option value="">Computer26</option>
                    <option value="">Computer27</option>
                    <option value="">Computer28</option>
                    <option value="">Computer29</option>
                    <option value="">Computer30</option>
                    <option value="">Computer31</option>
                </select>
            </div>

            <button type="submit" class="login-btn">Time In</button>

            
        </form>
    </div>
</body>
</html>
